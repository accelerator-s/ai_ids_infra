<section class="config">
  <div class="config__layout">
    <div class="config__col">
      <div class="config__card card">
        <h3 class="section-title"><span class="icon" data-icon="status"></span>服务配置</h3>
        <p class="section-sub">配置保存在服务端数据库，不依赖任何配置文件。</p>

        <div class="config__field">
          <label class="field-label" for="cfg-port">服务端口</label>
          <input class="input" id="cfg-port" data-port type="number" min="1" max="65535" placeholder="8000" />
          <p class="config__hint" data-port-hint></p>
        </div>
      </div>

      <div class="config__card card">
        <h3 class="section-title"><span class="icon" data-icon="robot"></span>大模型接入</h3>
        <p class="section-sub">OpenAI 兼容接口，用于 AI 辅助研判和评测报告。</p>

        <div class="config__field">
          <label class="field-label" for="cfg-base">服务地址（Base URL）</label>
          <input class="input" id="cfg-base" data-base type="url" placeholder="https://example.com/v1" />
        </div>

        <div class="config__field">
          <label class="field-label" for="cfg-key">访问密钥（API Key）</label>
          <input class="input" id="cfg-key" data-key type="password" placeholder="留空则不修改已保存的密钥" autocomplete="off" />
        </div>

        <div class="config__field">
          <label class="field-label" for="cfg-model-trigger">模型</label>
          <div class="config__model-row">
            <div class="config-select" data-model-select>
              <button class="config-select__trigger" id="cfg-model-trigger" type="button" data-select-trigger
                aria-haspopup="listbox" aria-expanded="false">
                <span data-select-value>（先获取模型列表）</span>
                <span class="config-select__chevron" aria-hidden="true">⌄</span>
              </button>
              <div class="config-select__list" data-select-list role="listbox" hidden></div>
            </div>
            <button class="btn btn--ghost" type="button" data-fetch-models>
              <span class="icon" data-icon="refresh"></span>获取列表
            </button>
          </div>
        </div>

        <div class="config__field config__temperature">
          <div class="config__temperature-head">
            <label class="field-label" for="cfg-temp">生成随机度（Temperature）</label>
            <span class="config__temperature-value" data-temp-val>0.2</span>
          </div>
          <input class="config__slider" id="cfg-temp" data-temp type="range" min="0" max="2" step="0.1" value="0.2" />
          <div class="config__slider-scale"><span>稳定</span><span>灵活</span></div>
        </div>

        <div class="config__actions">
          <button class="btn" type="button" data-test>
            <span class="icon" data-icon="check"></span>测试连接
          </button>
          <button class="btn btn--primary" type="button" data-save>
            <span class="icon" data-icon="send"></span>保存配置
          </button>
          <span class="config__busy" data-busy hidden><span class="spinner"></span></span>
          <span class="config__msg" data-msg hidden></span>
        </div>
        <div class="config__test-out" data-test-out hidden></div>
      </div>
    </div>

    <aside class="config__aside">
      <article class="config__aside-card card">
        <div class="config__aside-head">
          <span class="icon" data-icon="bulb"></span>
          <h3>接入说明</h3>
        </div>
        <ol>
          <li>填写服务地址和访问密钥</li>
          <li>获取列表并选择模型</li>
          <li>测试连接确认可用后保存</li>
        </ol>
      </article>

      <article class="config__aside-card config__aside-card--soft card">
        <div class="config__aside-head">
          <span class="icon" data-icon="bulb"></span>
          <h3>参数说明</h3>
        </div>
        <div class="config__fact">
          <strong>服务端口</strong>
          <span>修改后需重启服务进程才会生效，重启前请用原端口访问。</span>
        </div>
        <div class="config__fact">
          <strong>生成随机度</strong>
          <span>数值越低输出越稳定，用于安全研判建议保持较低数值。</span>
        </div>
      </article>
    </aside>
  </div>
</section>
